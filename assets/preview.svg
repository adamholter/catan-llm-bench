    <text x="98" y="514" font-size="34" font-weight="700">No-secret smoke test</text>
    <rect x="80" y="584" width="1230" height="170" rx="18" stroke="#111" stroke-width="5"/>
    <text x="106" y="640" font-size="28">python3 -m venv .venv</text>
    <text x="106" y="680" font-size="28">.venv/bin/python -m pip install -r requirements.txt</text>
    <text x="106" y="720" font-size="28">.venv/bin/python bench.py --mode fake --games 2 --max-actions 80 --vps 6 --seed 42</text>
    <text x="96" y="858" font-size="24">Black-and-white sketch preview based on the actual benchmark flow in this repo.</text>
  </g>
