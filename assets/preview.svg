  <g font-family="Comic Sans MS, Chalkboard SE, Marker Felt, cursive" fill="#111">
    <text x="92" y="100" font-size="54" font-weight="700">Catan LLM Benchmark</text>
    <text x="96" y="158" font-size="28">A text-only harness for seeing how LLMs choose legal actions inside a real Catan simulator.</text>
    <text x="100" y="228" font-size="34" font-weight="700">1. Sample state</text>
    <text x="98" y="312" font-size="24">compact JSON</text>
    <text x="98" y="344" font-size="24">current player</text>
    <text x="98" y="376" font-size="24">numbered legal moves</text>
    <rect x="74" y="248" width="268" height="170" rx="18" stroke="#111" stroke-width="5"/>
    <text x="426" y="228" font-size="34" font-weight="700">2. Prompt model</text>
    <text x="422" y="312" font-size="24">choose one index</text>
    <text x="422" y="344" font-size="24">return strict JSON</text>
    <text x="422" y="376" font-size="24">fallback if invalid</text>
    <rect x="398" y="248" width="268" height="170" rx="18" stroke="#111" stroke-width="5"/>
    <text x="758" y="228" font-size="34" font-weight="700">3. Log everything</text>
    <text x="756" y="312" font-size="24">prompt</text>
    <text x="756" y="344" font-size="24">response</text>
    <text x="756" y="376" font-size="24">selected action + summary</text>
    <rect x="730" y="248" width="330" height="170" rx="18" stroke="#111" stroke-width="5"/>
    <text x="1086" y="228" font-size="34" font-weight="700">4. Compare runs</text>
    <text x="1084" y="312" font-size="24">fake mode</text>
    <text x="1084" y="344" font-size="24">HF router mode</text>
    <text x="1084" y="376" font-size="24">batch state collection</text>
    <rect x="1060" y="248" width="264" height="170" rx="18" stroke="#111" stroke-width="5"/>
    <path d="M346 332H392"/>
    <path d="M670 332H724"/>
    <path d="M1064 332H1072"/>
    <path d="M346 330l20-16"/>
    <path d="M346 334l18 18"/>
    <path d="M674 330l18-16"/>
